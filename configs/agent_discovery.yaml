refresh_ttl_seconds: 60

filters:
  include_categories: []
  exclude_categories: []
  include_tags: []
  exclude_tags: []

default_a2a:
  timeout_seconds: 20
  auth_strategy: none
  auth_header_name: Authorization
  auth_token_env:

prefetch:
  record_reason: true
  rules:
    - category: security
      keywords:
        - security
        - 安全
        - 审计
        - 隔离
        - 边界
    - category: compliance
      keywords:
        - compliance
        - 合规
        - 制度
        - 审批
        - 验收
    - category: analytics
      keywords:
        - analytics
        - 分析
        - 指标
        - 日志
        - 运营
    - category: ""
      keywords:
        - external
        - a2a
        - broker
        - 外部
        - 动态发现
        - 外部智能体

sources:
  - source_id: local-demo-catalog
    transport: stdio
    server_module: app.mcp.external_agent_catalog_server
    tool_name: external_agent_catalog_list
    get_tool_name: external_agent_catalog_get
    timeout_seconds: 12
    env:
      EXTERNAL_AGENT_CATALOG_FILE: os.environ/EXTERNAL_AGENT_CATALOG_FILE
      EXTERNAL_AGENT_BASE_URL: os.environ/EXTERNAL_AGENT_BASE_URL
